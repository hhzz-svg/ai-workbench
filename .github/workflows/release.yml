name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Workbench ${{ github.ref_name }}
          body: |
            首个 Windows 一键启动包。

            - 支持普通用户通过 API Base URL + API Key 使用
            - 本机 Codex CLI 改为可选
            - 更新 README 首屏与新面板演示视频
            - 内置示例资料和 Windows 启动脚本

            安装方式：下载 zip 后解压，先运行 install.bat，再运行 start.bat。
          files: dist/release/*.zip
