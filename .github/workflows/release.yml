name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Workbench ${{ github.ref_name }}
          body: |
            Windows 一键启动包更新。

            - 补齐并加固 start.bat/start.ps1/start-lan.ps1 启动链路
            - 首次无 API 配置时引导到设置，避免任务后台失败
            - 前端增加本地后端断连提示和重新连接入口
            - 内置示例资料、使用文档和 Windows 启动脚本

            安装方式：下载 zip 后解压，先运行 install.bat，再运行 start.bat。
          files: dist/release/*.zip
