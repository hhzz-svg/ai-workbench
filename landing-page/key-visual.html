<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Workbench 主视觉</title>
<style>
    :root {
        --ink: #15211f;
        --muted: #5d6b67;
        --line: #dbe3e0;
        --soft: #f4f7f6;
        --paper: #ffffff;
        --teal: #0f6b5e;
        --teal-dark: #0b4f46;
        --teal-bright: #2fb39c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #050d0b;
    }

    /* 1600 x 900 主视觉画布 */
    .stage {
        position: relative;
        width: 1600px;
        height: 900px;
        overflow: hidden;
        background:
            radial-gradient(1200px 700px at 78% -10%, rgba(47,179,156,0.22), transparent 60%),
            radial-gradient(900px 600px at 100% 110%, rgba(15,107,94,0.35), transparent 55%),
            linear-gradient(135deg, #07120f 0%, #0a1a16 48%, #081613 100%);
        color: #ffffff;
    }

    /* 细网格纹理 */
    .grid-tex {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(120deg, rgba(0,0,0,0.9), transparent 65%);
    }

    /* 左侧文案区 */
    .copy {
        position: absolute;
        top: 86px;
        left: 88px;
        width: 720px;
        z-index: 5;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 40px;
    }
    .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 13px;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: var(--teal-dark);
        font-weight: 900;
        font-size: 22px;
        letter-spacing: -0.5px;
    }
    .brand-name {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.5px;
    }
    .brand-name small {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255,255,255,0.6);
        letter-spacing: 2px;
        margin-top: 2px;
    }

    .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 16px;
        border: 1px solid rgba(47,179,156,0.45);
        border-radius: 999px;
        background: rgba(47,179,156,0.12);
        color: #8ff0dc;
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 26px;
    }
    .eyebrow .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--teal-bright);
        box-shadow: 0 0 12px var(--teal-bright);
    }

    h1 {
        font-size: 62px;
        line-height: 1.12;
        font-weight: 850;
        letter-spacing: -0.5px;
        margin-bottom: 26px;
    }
    h1 .hl {
        color: var(--teal-bright);
    }

    .sub {
        font-size: 21px;
        line-height: 1.65;
        color: rgba(255,255,255,0.82);
        max-width: 600px;
        margin-bottom: 40px;
    }

    /* 亮点标签 */
    .feats {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 46px;
    }
    .feat {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 11px 18px;
        border-radius: 11px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 16px;
        font-weight: 650;
        color: rgba(255,255,255,0.92);
    }
    .feat svg { width: 18px; height: 18px; flex: none; }

    /* 数据条 */
    .stats {
        display: flex;
        gap: 0;
    }
    .stat {
        padding-right: 34px;
        margin-right: 34px;
        border-right: 1px solid rgba(255,255,255,0.16);
    }
    .stat:last-child { border-right: 0; }
    .stat strong {
        display: block;
        font-size: 34px;
        font-weight: 850;
        letter-spacing: -0.5px;
    }
    .stat span {
        display: block;
        margin-top: 6px;
        font-size: 14px;
        color: rgba(255,255,255,0.62);
    }
    .stat strong em {
        font-style: normal;
        color: var(--teal-bright);
    }

    /* 右侧成品拼贴 */
    .collage {
        position: absolute;
        top: 0;
        right: 0;
        width: 760px;
        height: 900px;
        z-index: 3;
    }
    .card {
        position: absolute;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
        background: #0d1714;
    }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card .tag {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 5px 11px;
        border-radius: 8px;
        background: rgba(7,18,15,0.82);
        backdrop-filter: blur(4px);
        font-size: 12.5px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.3px;
    }

    /* 工作台界面卡 — 主卡 */
    .c-console {
        top: 96px; right: 470px;
        width: 252px; height: 540px;
        transform: rotate(-4deg);
        z-index: 4;
    }
    /* 竖版小红书 — 花样年华 */
    .c-mood {
        top: 64px; right: 196px;
        width: 250px; height: 420px;
        transform: rotate(3deg);
        z-index: 5;
    }
    /* 竖版小红书 — 小王子 */
    .c-prince {
        top: 470px; right: 232px;
        width: 222px; height: 372px;
        transform: rotate(-3deg);
        z-index: 6;
    }
    /* 超宽横版 — 人类简史 */
    .c-sapiens {
        top: 150px; right: -28px;
        width: 320px; height: 152px;
        transform: rotate(5deg);
        z-index: 7;
    }
    /* 超宽横版 — 星际穿越 */
    .c-inter {
        top: 540px; right: -40px;
        width: 322px; height: 152px;
        transform: rotate(-5deg);
        z-index: 7;
    }

    /* 底部品牌条 */
    .footer {
        position: absolute;
        left: 88px;
        bottom: 40px;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 5;
        color: rgba(255,255,255,0.66);
        font-size: 16px;
        font-weight: 600;
    }
    .footer .gh {
        display: flex; align-items: center; gap: 8px;
        color: #fff; font-weight: 700;
    }
    .footer .gh svg { width: 20px; height: 20px; }
    .footer .pill {
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.14);
        font-size: 14px;
    }

    /* 右侧渐隐遮罩让拼贴融入背景 */
    .collage::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #081613 0%, rgba(8,22,19,0.0) 22%);
        z-index: 20;
        pointer-events: none;
    }
</style>
</head>
<body>
    <div class="stage">
        <div class="grid-tex"></div>

        <div class="copy">
            <div class="brand">
                <span class="brand-mark">AI</span>
                <span class="brand-name">AI Workbench<small>本地 AI 创作工作台</small></span>
            </div>

            <span class="eyebrow"><span class="dot"></span>本地运行 · 数据不外传</span>

            <h1>一个工作台<br>统一调用<span class="hl">论文 · PPT · 海报 · 网页</span></h1>

            <p class="sub">上传资料，选好方向，点一下生成。论文演示、学术润色、视觉海报、网页演示，全部收进同一条本地创作流水线。</p>

            <div class="feats">
                <span class="feat">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#2fb39c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    统一入口，自动路由
                </span>
                <span class="feat">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#2fb39c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    产物可二次加工
                </span>
                <span class="feat">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#2fb39c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    本地优先 · 开源免费
                </span>
            </div>

            <div class="stats">
                <div class="stat">
                    <strong>5<em>类</em></strong>
                    <span>核心创作 Skill</span>
                </div>
                <div class="stat">
                    <strong>PPTX · PDF · HTML</strong>
                    <span>统一产物管理</span>
                </div>
                <div class="stat">
                    <strong>本机</strong>
                    <span>资料密钥留在电脑上</span>
                </div>
            </div>
        </div>

        <div class="collage">
            <div class="card c-console">
                <img src="assets/workbench-console-wide.png" alt="">
                <span class="tag">真实工作台界面</span>
            </div>
            <div class="card c-mood">
                <img src="assets/mondo-mood.jpg" alt="">
                <span class="tag">小红书竖版</span>
            </div>
            <div class="card c-prince">
                <img src="assets/mondo-prince.jpg" alt="">
                <span class="tag">读书分享</span>
            </div>
            <div class="card c-sapiens">
                <img src="assets/mondo-sapiens.jpg" alt="">
                <span class="tag">公众号封面</span>
            </div>
            <div class="card c-inter">
                <img src="assets/mondo-interstellar.jpg" alt="">
                <span class="tag">科幻影评</span>
            </div>
        </div>

        <div class="footer">
            <span class="gh">
                <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.72-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 015 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.6.69.49A10.02 10.02 0 0022 12.25C22 6.58 17.52 2 12 2z"/></svg>
                github.com/hhzz-svg/ai-workbench
            </span>
            <span class="pill">MIT License</span>
            <span class="pill">下载即可本地运行</span>
        </div>
    </div>
</body>
</html>
